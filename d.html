<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Player</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById("video");

    const player = new shaka.Player(video);

    player.addEventListener("error", function (event) {
        console.error("Shaka error:", event.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "f6564ec2aee819046328a0e153be574d":
                "ff46a8a1031eb27ef22576a077c98ab7"
            }
        }
    });

    try {

        await player.load(
            "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/cenc.mpd"
        );

        if (player.isLive()) {
            player.goToLive();
        }

        await video.play().catch(function (e) {
            console.warn("Autoplay blocked:", e);
        });

    }
    catch (e) {
        console.error("Load failed:", e);
    }
}

init();
</script>

</body>
</html>
