<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Shaka Player</title>

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js"
        crossorigin="anonymous">
    </script>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css"
        crossorigin="anonymous"
    >

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        .player-container {
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div
    class="player-container"
    data-shaka-player-container
>
    <video
        id="video"
        data-shaka-player
        autoplay
        muted
    ></video>
</div>

<script>
    const manifestUrl =
        "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/cenc.mpd";

    const clearKeys = {
        "f6564ec2aee819046328a0e153be574d":
        "ff46a8a1031eb27ef22576a077c98ab7"
    };


    async function initPlayer() {

        const video =
            document.getElementById("video");

        const ui =
            video.ui;

        const controls =
            ui.getControls();

        const player =
            controls.getPlayer();


        player.configure({
            drm: {
                clearKeys: clearKeys
            }
        });


        ui.configure({
            controlPanelElements: [
                "play_pause",
                "mute",
                "volume",
                "spacer",
                "time_and_duration",
                "quality",
                "fullscreen",
                "overflow_menu"
            ]
        });


        player.addEventListener(
            "error",
            event => {
                console.error(
                    "Shaka Player Error:",
                    event.detail
                );
            }
        );


        try {

            await player.load(manifestUrl);

            console.log(
                "Video loaded successfully"
            );

        } catch (error) {

            console.error(
                "Playback failed:",
                error
            );
        }
    }


    document.addEventListener(
        "shaka-ui-loaded",
        initPlayer
    );
</script>

</body>
</html>
