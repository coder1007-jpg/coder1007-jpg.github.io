<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Shaka Player</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css"
    >

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .shaka-video-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div id="container">
    <!-- IMPORTANT: no native "controls" attribute -->
    <video
        id="video"
        autoplay
        playsinline
    ></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>

<script>
    const STREAM_URL =
        "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/enc/ds6pjm8gzg/out/v1/fc40f22f10374517a2784e1d97cb23f4/cenc.mpd";

    const KEY_ID =
        "1f68713028d439ec03be07f56c1d6213";

    const KEY =
        "20093db6455160fffed4c394def3193d";


    async function init() {
        shaka.polyfill.installAll();

        if (!shaka.Player.isBrowserSupported()) {
            console.error("Browser not supported");
            alert("Browser not supported");
            return;
        }

        const video = document.getElementById("video");
        const container = document.getElementById("container");

        try {
            // Shaka 5.x initialization
            const player = new shaka.Player();

            await player.attach(video);

            // Create only one Shaka UI instance
            const ui = new shaka.ui.Overlay(
                player,
                container,
                video
            );

            // Useful for debugging
            window.player = player;
            window.ui = ui;

            player.addEventListener("error", (event) => {
                console.error(
                    "Shaka Player Error:",
                    event.detail
                );
            });

            player.configure({
                drm: {
                    clearKeys: {
                        [KEY_ID]: KEY
                    }
                }
            });

            console.log("Loading stream...");

            await player.load(STREAM_URL);

            console.log("Stream loaded successfully");

            // Move to live edge
            if (player.isLive()) {
                const range = player.seekRange();

                if (range && range.end > range.start) {
                    video.currentTime = Math.max(
                        range.start,
                        range.end - 1
                    );
                }
            }

            try {
                await video.play();
            }
            catch (playError) {
                console.warn(
                    "Autoplay blocked:",
                    playError
                );
            }

        }
        catch (error) {
            console.error(
                "Player initialization failed:",
                error
            );

            alert(
                "Unable to load stream. Check browser console for details."
            );
        }
    }


    document.addEventListener(
        "DOMContentLoaded",
        init
    );
</script>

</body>
</html>
