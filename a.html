<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simple Shaka Player</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
}

#container{
    width:100%;
    height:100%;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>

<body>

<div id="container">
    <video id="video" autoplay controls playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>

<script>
const STREAM_URL = "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/enc/ds6pjm8gzg/out/v1/fc40f22f10374517a2784e1d97cb23f4/cenc.mpd";
const KEY_ID     = "1f68713028d439ec03be07f56c1d6213";
const KEY        = "20093db6455160fffed4c394def3193d";

async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported");
        return;
    }

    const video = document.getElementById("video");
    const container = document.getElementById("container");

    const player = new shaka.Player(video);

    new shaka.ui.Overlay(player, container, video);

    player.addEventListener("error", e => {
        console.error(e.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                [KEY_ID]: KEY
            }
        }
    });

    await player.load(STREAM_URL);

    if (player.isLive()) {
        video.currentTime = player.seekRange().end;
    }

    await video.play().catch(console.warn);
}

init();
</script>

</body>
</html>
