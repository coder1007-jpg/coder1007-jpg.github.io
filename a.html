<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported");
        return;
    }

    const video = document.getElementById("video");
    const player = new shaka.Player(video);

    player.addEventListener("error", e => {
        console.error(e.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "1f68713028d439ec03be07f56c1d6213": "20093db6455160fffed4c394def3193d"
            }
        }
    });

    try {
        await player.load("https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/enc/ds6pjm8gzg/out/v1/fc40f22f10374517a2784e1d97cb23f4/cenc.mpd");
	player.goToLive();
    }
    catch (e) {
        console.error(e);
    }
}

init();
</script>

</body>
</html>
