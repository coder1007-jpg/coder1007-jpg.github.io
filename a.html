<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    >

    <meta name="referrer" content="no-referrer">

    <title>Player</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css"
    >

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>

<body>

<div
    id="player-container"
    class="shaka-video-container"
>
    <video
        id="video"
        autoplay
        muted
        playsinline
        preload="auto"
    ></video>
</div>


<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>

<script>
    const STREAM_URL =
        "https://otte.cache.aiv-cdn.net/iad-nitro/live/clients/enc/ds6pjm8gzg/out/v1/fc40f22f10374517a2784e1d97cb23f4/cenc.mpd";

    const KEY_ID =
        "1f68713028d439ec03be07f56c1d6213";

    const KEY =
        "20093db6455160fffed4c394def3193d";


    async function initPlayer() {

        shaka.polyfill.installAll();

        if (!shaka.Player.isBrowserSupported()) {
            console.error("Browser not supported");
            return;
        }


        const video =
            document.getElementById("video");

        const container =
            document.getElementById("player-container");


        const player = new shaka.Player();

        await player.attach(video);


        /*
         * Shaka Player controls
         */
        const ui = new shaka.ui.Overlay(
            player,
            container,
            video
        );


        ui.configure({

            controlPanelElements: [
                "play_pause",
                "mute",
                "volume",
                "time_and_duration",
                "spacer",
                "picture_in_picture",
                "quality",
                "fullscreen"
            ],

            addBigPlayButton: true,

            fadeDelay: 3
        });


        player.configure({

            drm: {
                clearKeys: {
                    [KEY_ID]: KEY
                }
            },

            abr: {
                enabled: true,
                defaultBandwidthEstimate: 10000000
            },

            manifest: {

                defaultPresentationDelay: 4,

                dash: {
                    ignoreSuggestedPresentationDelay: true,
                    ignoreMinBufferTime: true,
                    autoCorrectDrift: true
                }
            },

            streaming: {

                bufferingGoal: 10,

                rebufferingGoal: 2,

                bufferBehind: 15,

                lowLatencyMode: true,

                jumpLargeGaps: true,

                retryParameters: {

                    maxAttempts: 5,

                    baseDelay: 1000,

                    timeout: 20000
                }
            }
        });


        player.addEventListener(
            "error",
            function (event) {

                console.error(
                    "Shaka Player Error:",
                    event.detail
                );
            }
        );


        try {

            await player.load(STREAM_URL);


            if (player.isLive()) {

                const range =
                    player.seekRange();

                if (range.end > range.start) {

                    video.currentTime =
                        range.end;
                }
            }


            await video.play().catch(
                function (error) {

                    console.warn(
                        "Autoplay blocked:",
                        error
                    );
                }
            );

        }
        catch (error) {

            console.error(
                "Player Error:",
                error
            );
        }
    }


    document.addEventListener(
        "DOMContentLoaded",
        initPlayer
    );
</script>

</body>
</html>
