<style>
:root{
    --primary:#2563eb;

    --bg:#f5f7fb;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:25px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.card{
    background:var(--card);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:15px;
    color:var(--primary);
}

.link{
    display:block;
    text-decoration:none;
    background:var(--primary);
    color:#fff;
    padding:12px 15px;
    margin:10px 0;
    border-radius:8px;
    transition:.2s;
    word-break:break-word;
}

.link:hover{
    background:var(--primary-hover);
    transform:translateY(-2px);
}
</style>
