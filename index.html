    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
    margin-bottom:15px;
    color:var(--primary);
}

.link{
    display:block;
    text-decoration:none;
    background:var(--primary);
    color:#fff;
    padding:12px 15px;
    margin:10px 0;
    border-radius:8px;
    transition:.2s;
    word-break:break-word;
}

.link:hover{
    background:var(--primary-hover);
    transform:translateY(-2px);
}
