<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Player</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById("video");

    const player = new shaka.Player(video);

    player.addEventListener("error", function (event) {
        console.error("Shaka error:", event.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "4f4c3a9912ea752e88f4497864a1bc8b":
                "278128004fe8c6ffb2cd2a0c154a241a"
            }
        }
    });

    try {

        await player.load(
            "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/x0srg3jjpz/out/v1/f779c49314394d61886d63f58d9d52e4/cenc.mpd"
        );

        if (player.isLive()) {
            player.goToLive();
        }

        await video.play().catch(function (e) {
            console.warn("Autoplay blocked:", e);
        });

    }
    catch (e) {
        console.error("Load failed:", e);
    }
}

init();
</script>

</body>
</html>
