<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Player</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById("video");

    const player = new shaka.Player(video);

    player.addEventListener("error", function (event) {
        console.error("Shaka error:", event.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "1c6bfd8d1cdd4df69ea5fc4dd2f025bb":
                "b6fd90027dac7a94a9461f8b2638cbb4"
            }
        }
    });

    try {

        await player.load(
            "https://dmbgaz4xf6jyh.cloudfront.net/live-stream-dai/69690cfcce0dc031830e7c1a/123a264b71764485bd49eca2d552cf33/d97743de3620a865848fff7a9de14dda1bf2409d/session/5795ce7e-bcd4-4de8-8e2d-4d21d4567a37/manifest.mpd?aid=688aae6d61c87d6274c05065&dnt=true&access_token=63ey9SOpQeHBRfWJYQLXQjelQc0QM1HXmlHp4iZrH8UCOCM8QtGIGg1sEEPJH0R0yXktUEXdLeB&uid=Knx65GY6UbaWSADZybEvf6m5MvqNIuNs&sid=bwRy9BgSc4RFeVhYh52hVIY8uPsJ4v4d&pid=A0xT1VnepBvKKqyeyRNtNkZBmHBrNNZM&ref=ditu.caracoltv.com&ext_pb=0&es=dmbgaz4xf6jyh.cloudfront.net&proto=https&pz=us&xr=us-east-2&manifestfilter=video_height:480-1080"
        );

        if (player.isLive()) {
            player.goToLive();
        }

        await video.play().catch(function (e) {
            console.warn("Autoplay blocked:", e);
        });

    }
    catch (e) {
        console.error("Load failed:", e);
    }
}

init();
</script>

</body>
</html>
