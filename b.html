<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Player</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay playsinline></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        console.error("Browser not supported");
        return;
    }

    const video = document.getElementById("video");

    const player = new shaka.Player(video);

    player.addEventListener("error", function (event) {
        console.error("Shaka error:", event.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "2c338a117d434ce4bbe3569231af90f1":
                "a9633d901ee8a3f4f58ac314b5c5f4fb"
            }
        }
    });

    try {

        await player.load(
            "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mp"
        );

        if (player.isLive()) {
            player.goToLive();
        }

        await video.play().catch(function (e) {
            console.warn("Autoplay blocked:", e);
        });

    }
    catch (e) {
        console.error("Load failed:", e);
    }
}

init();
</script>

</body>
</html>
