<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Shaka ClearKey Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.compiled.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>
async function init() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported");
        return;
    }

    const video = document.getElementById("video");
    const player = new shaka.Player(video);

    player.addEventListener("error", e => {
        console.error(e.detail);
    });

    player.configure({
        drm: {
            clearKeys: {
                "2c338a117d434ce4bbe3569231af90f1": "a9633d901ee8a3f4f58ac314b5c5f4fb"
            }
        }
    });

    try {
        await player.load("https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/fifa_ppv1/default/index.mpd");
	player.goToLive();
    }
    catch (e) {
        console.error(e);
    }
}

init();
</script>

</body>
</html>
